<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#170705" />
  <title>VIP Card Perspective Study</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #170705;
      --paper: #f7eee7;
      --red: #e71918;
      --gold: #f3b342;
      --line: rgba(255, 235, 223, 0.18);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; background: var(--ink); }

    body {
      color: var(--paper);
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
    }

    .site-header {
      position: fixed;
      inset: 0 0 auto;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      padding: 0 clamp(20px, 4vw, 64px);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(23, 7, 5, 0.9), rgba(23, 7, 5, 0));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .brand { font-size: 13px; font-weight: 800; letter-spacing: 0.18em; }
    .edition { color: rgba(247, 238, 231, 0.64); font-size: 11px; letter-spacing: 0.12em; }

    .experience {
      position: relative;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 46%, rgba(237, 35, 24, 0.30), transparent 29%),
        radial-gradient(circle at 50% 100%, rgba(155, 12, 14, 0.24), transparent 43%),
        var(--ink);
    }

    .stage {
      position: relative;
      min-height: 100dvh;
      display: grid;
      grid-template-columns: minmax(220px, 0.78fr) minmax(320px, 1.5fr) minmax(180px, 0.72fr);
      align-items: center;
      gap: clamp(20px, 4vw, 80px);
      padding: 104px clamp(20px, 5vw, 80px) 50px;
      perspective: 1800px;
      isolation: isolate;
    }

    .intro {
      position: relative;
      z-index: 3;
      max-width: 285px;
      align-self: end;
      margin-bottom: 9vh;
    }

    .intro p {
      margin: 0 0 16px;
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
    }

    h1 {
      max-width: 6ch;
      margin: 0;
      font-size: clamp(42px, 5.2vw, 88px);
      font-weight: 800;
      letter-spacing: -0.075em;
      line-height: 0.9;
    }

    .copy {
      max-width: 23ch;
      margin: 24px 0 0;
      color: rgba(247, 238, 231, 0.68);
      font-size: 15px;
      line-height: 1.6;
    }

    .view-labels {
      position: relative;
      z-index: 3;
      align-self: start;
      margin-top: 13vh;
      text-align: right;
      color: rgba(247, 238, 231, 0.72);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
    }

    .view-labels span { display: block; }
    .view-labels .side-label { position: absolute; inset: 0 0 auto auto; opacity: 0; }

    .card-space {
      position: relative;
      z-index: 2;
      width: min(50vw, 690px);
      min-width: 320px;
      aspect-ratio: 1;
      justify-self: center;
      transform-style: preserve-3d;
    }

    .webgl-card,
    .fallback-card {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .webgl-card {
      z-index: 2;
      opacity: 0;
      transition: opacity 180ms ease-out;
    }

    .webgl-card.is-ready { opacity: 1; }

    .fallback-card {
      z-index: 1;
      transition: opacity 180ms ease-out;
    }

    .webgl-card.is-ready + .fallback-card { opacity: 0; }

    .card-space::after {
      content: "";
      position: absolute;
      z-index: 0;
      left: 50%;
      bottom: 3%;
      width: 76%;
      height: 10%;
      border-radius: 50%;
      background: rgba(236, 37, 24, 0.28);
      filter: blur(28px);
      transform: translateX(-50%);
    }

    .frame-line {
      position: absolute;
      z-index: 1;
      width: min(73vw, 1050px);
      aspect-ratio: 1;
      border: 1px solid rgba(246, 185, 82, 0.17);
      border-radius: 50%;
      transform: rotate(-8deg) scaleX(1.15);
    }

    .afterword {
      display: grid;
      min-height: 54dvh;
      place-items: center;
      padding: 72px 24px;
      background: #210806;
      text-align: center;
    }

    .afterword p {
      max-width: 18ch;
      margin: 0;
      color: rgba(247, 238, 231, 0.74);
      font-size: clamp(23px, 3vw, 42px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.08;
    }

    @media (max-width: 780px) {
      .site-header { height: 60px; padding-inline: 18px; }
      .edition { display: none; }

      .stage {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
        gap: 0;
        padding: 82px 20px 34px;
      }

      .intro { align-self: start; margin: 0; max-width: 16rem; }
      .intro p { margin-bottom: 9px; font-size: 9px; }
      h1 { font-size: clamp(42px, 12vw, 62px); }
      .copy { display: none; }
      .card-space { width: min(94vw, 560px); min-width: 0; }
      .view-labels { margin: 0; align-self: end; text-align: left; font-size: 9px; }
      .view-labels .side-label { inset: 0 auto auto 0; }
      .frame-line { width: 135vw; }
    }

  </style>
</head>
<body>
  <header class="site-header">
    <div class="brand">VIP CARD</div>
    <div class="edition">PERSPECTIVE STUDY</div>
  </header>

  <main>
    <section class="experience" aria-label="VIP 卡片角度展示">
      <div class="stage">
        <div class="frame-line" aria-hidden="true"></div>

        <div class="intro">
          <p>VISUAL ACCESS</p>
          <h1>从正面，转向侧面</h1>
          <div class="copy">滚动驱动的伪 3D 展示。鱼眼质感逐步拉回，最后落到真实的斜侧产品视图。</div>
        </div>

        <div class="card-space" aria-hidden="true">
          <canvas class="webgl-card"></canvas>
          <img class="fallback-card" src="assets/vip/vip-card-fisheye-master.png" alt="" />
        </div>

        <div class="view-labels" aria-live="polite">
          <span class="front-label">正面视图</span>
          <span class="side-label">斜侧视图</span>
        </div>
      </div>
    </section>

    <section class="afterword">
      <p>轮廓变得更轻，厚度开始出现。</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script>
    (function () {
      if (!window.gsap || !window.ScrollTrigger || !window.THREE) return;

      gsap.registerPlugin(ScrollTrigger);

      var canvas = document.querySelector('.webgl-card');
      var cardSpace = document.querySelector('.card-space');
      var frontLabel = document.querySelector('.front-label');
      var sideLabel = document.querySelector('.side-label');
      var media = gsap.matchMedia();
      var state = { progress: 0 };
      var renderer;
      var scene;
      var camera;
      var mesh;
      var material;

      try {
        renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setClearColor(0x000000, 0);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(28, 1, 0.1, 10);
        camera.position.z = 4.2;

        material = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          uniforms: {
            uFront: { value: null },
            uSide: { value: null },
            uProgress: { value: 0 },
            uTurn: { value: 0 },
            uFrameMix: { value: 0 },
            uFishRelease: { value: 0 }
          },
          vertexShader: [
            'uniform float uProgress;',
            'uniform float uTurn;',
            'varying vec2 vUv;',
            'void main() {',
            '  vUv = uv;',
            '  vec3 p = position;',
            '  vec2 centered = position.xy * 0.5;',
            '  p.x -= uTurn * 0.075 * (1.0 - centered.y * centered.y * 3.6);',
            '  gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);',
            '}'
          ].join('\n'),
          fragmentShader: [
            'uniform sampler2D uFront;',
            'uniform sampler2D uSide;',
            'uniform float uProgress;',
            'uniform float uTurn;',
            'uniform float uFrameMix;',
            'uniform float uFishRelease;',
            'varying vec2 vUv;',
            'float softNoise(vec2 p) {',
            '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);',
            '}',
            'void main() {',
            '  vec2 centered = vUv - 0.5;',
            '  float radius = dot(centered, centered);',
            '  vec2 frontUv = vUv;',
            '  vec4 front = texture2D(uFront, frontUv);',
            '  vec4 side = texture2D(uSide, vUv);',
            '  float grain = (softNoise(vUv * 38.0) - 0.5) * 0.008;',
            '  float wave = sin(centered.y * 12.0 + centered.x * 4.0 + radius * 28.0) * 0.006;',
            '  float morph = smoothstep(0.04, 0.96, uFrameMix + wave + grain);',
            '  vec4 color = mix(front, side, morph);',
            '  float highlight = smoothstep(0.0, 0.16, 1.0 - abs(centered.x + 0.34 - uProgress * 0.84) * 6.0);',
            '  highlight *= smoothstep(0.06, 0.76, uProgress) * (1.0 - smoothstep(0.76, 1.0, uProgress));',
            '  color.rgb += vec3(1.0, 0.68, 0.31) * highlight * 0.22;',
            '  color.a = mix(front.a, side.a, morph);',
            '  gl_FragColor = color;',
            '}'
          ].join('\n')
        });

        mesh = new THREE.Mesh(new THREE.PlaneGeometry(1.92, 1.92, 84, 84), material);
        scene.add(mesh);
      } catch (error) {
        return;
      }

      var sequenceSources = [
        'assets/vip/vip-card-fisheye-master.png',
        'assets/vip/sequence-master/frame-00.png',
        'assets/vip/sequence-master/frame-12.png',
        'assets/vip/sequence-master/frame-15.png',
        'assets/vip/sequence-master/frame-18.png',
        'assets/vip/sequence-master/frame-24.png',
        'assets/vip/vip-card-angle-alpha.png'
      ];
      var sequenceTextures = [];

      function render() {
        if (!renderer || !mesh) return;
        var progress = state.progress;
        var sequencePosition = progress * (sequenceSources.length - 1);
        var frameIndex = Math.min(sequenceSources.length - 2, Math.floor(sequencePosition));
        var frameMix = Math.min(1, sequencePosition - frameIndex);
        var turnProgress = Math.max(0, (progress - 1 / (sequenceSources.length - 1)) / (1 - 1 / (sequenceSources.length - 1)));
        var turn = 1 - Math.cos(turnProgress * Math.PI * 0.5);
        if (loaded === sequenceSources.length) {
          material.uniforms.uFront.value = sequenceTextures[frameIndex];
          material.uniforms.uSide.value = sequenceTextures[frameIndex + 1];
        }
        material.uniforms.uProgress.value = progress;
        material.uniforms.uTurn.value = turn;
        material.uniforms.uFrameMix.value = frameMix;
        material.uniforms.uFishRelease.value = frameIndex === 0 ? frameMix : 0;
        mesh.rotation.y = -turn * 0.055;
        mesh.rotation.x = turn * 0.018;
        mesh.position.x = -turn * 0.018;
        mesh.position.y = turn * 0.008;
        mesh.scale.setScalar(1);
        renderer.render(scene, camera);
      }

      function resize() {
        var size = Math.max(1, Math.floor(Math.min(cardSpace.clientWidth, cardSpace.clientHeight)));
        renderer.setSize(size, size, false);
        render();
      }

      new ResizeObserver(resize).observe(cardSpace);

      var loader = new THREE.TextureLoader();
      var loaded = 0;
      function textureReady(texture, index) {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        sequenceTextures[index] = texture;
        loaded += 1;
        if (loaded === sequenceSources.length) {
          material.uniforms.uFront.value = sequenceTextures[0];
          material.uniforms.uSide.value = sequenceTextures[1];
          canvas.classList.add('is-ready');
          resize();
          render();
          ScrollTrigger.refresh();
        }
      }

      sequenceSources.forEach(function (source, index) {
        loader.load(source, function (texture) { textureReady(texture, index); });
      });

      media.add({
        reduceMotion: '(prefers-reduced-motion: reduce)',
        isDesktop: '(min-width: 781px)'
      }, function (context) {
        var reduceMotion = context.conditions.reduceMotion;
        if (reduceMotion) {
          state.progress = 0;
          render();
          return;
        }

        state.progress = 0;

        var timeline = gsap.timeline({
          defaults: { ease: 'none' },
          scrollTrigger: {
            trigger: '.experience',
            start: 'top top',
            end: '+=2800',
            pin: true,
            scrub: 0.5,
            anticipatePin: 1,
            invalidateOnRefresh: true
          }
        });

        timeline
          .to(state, { progress: 1, duration: 1, onUpdate: render }, 0)
          .to(frontLabel, { autoAlpha: 0, duration: 0.16 }, 0.52)
          .to(sideLabel, { autoAlpha: 1, duration: 0.18 }, 0.56);

        return function () { timeline.kill(); };
      });
    }());
  </script>
</body>
</html>
