<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project | WYY Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0a; --text: #f5f5f5; --muted: #888; --accent: #ff8a1f; --border: #242424; --display: 'Syne', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; --body: Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  * { box-sizing: border-box; }
  body { min-height: 100svh; margin: 0; background: var(--bg); color: var(--text); font-family: var(--body); }
  a { color: inherit; text-decoration: none; }
  .project-nav { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem clamp(1.5rem, 4vw, 4rem); border-bottom: 1px solid var(--border); }
  .project-brand, .project-back { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; }
  .project-back { color: var(--muted); transition: color 180ms ease; }
  .project-back:hover, .project-back:focus-visible { color: var(--accent); }
  .project-shell { min-height: calc(100svh - 65px); display: grid; align-content: center; padding: clamp(5rem, 13vw, 11rem) clamp(1.5rem, 8vw, 10rem); }
  .project-index { margin: 0 0 1rem; color: var(--accent); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; }
  h1 { max-width: 12ch; margin: 0; font-family: var(--display); font-size: clamp(3rem, 9vw, 9rem); line-height: 0.88; letter-spacing: 0; }
  .project-type { margin: 1.5rem 0 0; color: var(--muted); font-size: 0.92rem; }
</style>
</head>
<body>
  <nav class="project-nav" aria-label="Project navigation">
    <a class="project-brand" href="index-v2.html#work">WYY Portfolio</a>
    <a class="project-back" href="index-v2.html#work">Back to work</a>
  </nav>
  <main class="project-shell">
    <p class="project-index" id="projectIndex">01 / Caimiao</p>
    <h1 id="projectTitle">Brand identity</h1>
    <p class="project-type" id="projectType">Caimiao / Visual design</p>
  </main>
  <script>
    const views = {
      brand: ['01 / Caimiao', 'Brand identity', 'Caimiao / Visual design'],
      system: ['02 / Caimiao', 'Visual system', 'Caimiao / Visual design'],
      task: ['03 / Caimiao', 'Task flow', 'Caimiao / App experience'],
      growth: ['04 / Caimiao', 'Growth system', 'Caimiao / App experience']
    };
    const view = new URLSearchParams(window.location.search).get('view');
    const content = views[view] || views.brand;
    document.getElementById('projectIndex').textContent = content[0];
    document.getElementById('projectTitle').textContent = content[1];
    document.getElementById('projectType').textContent = content[2];
    document.title = `${content[1]} | WYY Portfolio`;
  </script>
</body>
</html>
